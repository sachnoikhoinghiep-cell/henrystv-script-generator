<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — HenrysTV</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    body {
      display: flex; flex-direction: column; min-height: 100vh;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, rgba(200,169,110,.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 15% 100%, rgba(80,60,160,.06) 0%, transparent 50%),
        var(--bg);
    }

    /* ── decorative vertical lines ── */
    body::before {
      content: '';
      position: fixed; top: 0; left: 50%; width: 1px; height: 100vh;
      background: linear-gradient(to bottom, transparent 0%, rgba(200,169,110,.06) 30%, rgba(200,169,110,.06) 70%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    .login-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem; position: relative; z-index: 1;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: min(400px, 92vw);
      padding: 2.8rem 2.2rem;
      position: relative; overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,.5), 0 0 120px rgba(200,169,110,.04);
    }

    /* top accent line */
    .login-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,
        transparent 0%, var(--accent2) 20%, var(--accent) 50%, var(--accent2) 80%, transparent 100%);
    }
    /* bottom accent line */
    .login-box::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2), transparent);
    }

    .login-sigil {
      text-align: center;
      font-size: 2.2rem; color: var(--accent); opacity: .65;
      letter-spacing: .6rem; margin-bottom: 1rem;
    }

    .login-title {
      text-align: center;
      font-size: 1.15rem; font-weight: normal;
      color: var(--gold); letter-spacing: .12rem;
      margin-bottom: .35rem;
    }

    .login-sub {
      text-align: center;
      font-size: .78rem; color: var(--muted); font-style: italic;
      margin-bottom: 2.2rem; line-height: 1.6;
    }

    /* ── Google button ── */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: .9rem;
      width: 100%;
      background: #fff; color: #3c4043;
      border: 1px solid #dadce0; border-radius: 4px;
      padding: .85rem 1.2rem;
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
      font-size: .95rem; font-weight: 500;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
      text-decoration: none;
    }
    .btn-google:hover:not(:disabled) {
      background: #f8f9fa;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .btn-google:disabled {
      opacity: .6; cursor: not-allowed;
    }
    .btn-google svg {
      width: 20px; height: 20px; flex-shrink: 0;
    }

    .login-divider {
      display: flex; align-items: center; gap: .8rem;
      margin: 1.8rem 0 1.2rem;
      color: var(--muted2); font-size: .68rem; letter-spacing: .12rem; text-transform: uppercase;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .login-note {
      font-size: .75rem; color: var(--muted2); text-align: center;
      line-height: 1.65; margin-top: 1.4rem;
    }
    .login-note a { color: var(--accent); }
    .login-note a:hover { color: var(--gold); }

    .login-err {
      color: #e08080; font-size: .8rem; text-align: center;
      margin-top: .8rem; min-height: 1.1rem;
    }

    .login-loading {
      text-align: center; padding: 1.5rem 0; color: var(--muted);
      font-size: .85rem; font-style: italic; display: none;
    }
    .login-loading .spin {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: middle; margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-back {
      text-align: center; margin-top: 1rem;
      font-size: .75rem; color: var(--muted2);
    }
    .login-back a { color: var(--muted2); }
    .login-back a:hover { color: var(--muted); }

    /* ── ornament below box ── */
    .login-ornament {
      text-align: center; margin-top: 1.5rem;
      font-size: .75rem; letter-spacing: .35rem;
      color: var(--accent2); opacity: .45;
      position: relative; z-index: 1;
    }

    /* ── simple top nav ── */
    .nav-simple {
      background: rgba(8,8,16,.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: .65rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      position: relative; z-index: 2;
    }
    .nav-simple .logo {
      color: var(--gold); font-size: .95rem; letter-spacing: .1rem;
      text-decoration: none; flex: 1;
    }
    .nav-simple .logo span { color: var(--accent); opacity: .8; margin-right: .35rem; }
    .nav-simple a.back {
      font-size: .75rem; letter-spacing: .08rem; text-transform: uppercase;
      color: var(--muted2); text-decoration: none; transition: color .2s;
    }
    .nav-simple a.back:hover { color: var(--accent); }
  </style>
</head>
<body>

<nav class="nav-simple">
  <a href="/" class="logo"><span>☯</span>HenrysTV</a>
  <a href="/" class="back">← Trang chủ</a>
</nav>

<div class="login-wrap">
  <div>
    <div class="login-box">
      <div class="login-sigil">☯</div>
      <h1 class="login-title">Đăng nhập</h1>
      <p class="login-sub">
        HenrysTV Script &amp; SEO Generator<br>
        <span style="font-size:.7rem;color:var(--muted2)">Minh Triết Cổ Đông · Nội dung YouTube</span>
      </p>

      <!-- Google button -->
      <button class="btn-google" id="btnGoogle" onclick="signInWithGoogle()">
        <!-- Google "G" logo SVG -->
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Đăng nhập với Google
      </button>

      <!-- Loading state -->
      <div class="login-loading" id="loginLoading">
        <span class="spin"></span>Đang chuyển hướng đến Google…
      </div>

      <div class="login-err" id="loginErr"></div>

      <div class="login-divider">Bảo mật bởi Supabase Auth</div>

      <p class="login-note">
        Bằng cách đăng nhập, bạn đồng ý với
        <a href="/chinh-sach.html">Điều khoản sử dụng</a>
        và <a href="/chinh-sach.html">Chính sách bảo mật</a> của chúng tôi.
      </p>

      <div class="login-back">
        <a href="/">← Quay về trang chủ</a>
      </div>
    </div>

    <div class="login-ornament">☰  ☱  ☲  ☳  ☴  ☵  ☶  ☷</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
  // If already logged in → redirect to studio immediately
  (async () => {
    const session = await sharedGetSession();
    if (session) {
      window.location.replace('/studio.html');
    }
  })();

  async function signInWithGoogle() {
    const btn  = document.getElementById('btnGoogle');
    const load = document.getElementById('loginLoading');
    const err  = document.getElementById('loginErr');

    btn.disabled = true;
    btn.style.display = 'none';
    load.style.display = '';
    err.textContent = '';

    try {
      const { error } = await window._sbShared.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: 'https://henrystv.click/auth-callback.html',
          queryParams: {
            access_type: 'offline',
            prompt: 'select_account'
          }
        }
      });

      if (error) throw error;
      // Browser will redirect — no further action needed

    } catch (e) {
      err.textContent = e.message || 'Lỗi kết nối. Vui lòng thử lại.';
      btn.disabled = false;
      btn.style.display = 'flex';
      load.style.display = 'none';
    }
  }
</script>
</body>
</html>
