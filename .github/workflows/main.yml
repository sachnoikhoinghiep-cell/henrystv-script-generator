name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: node --check server.js

      - name: Verify app starts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PORT: 3001
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:3001 && echo "Server started OK"
          kill $SERVER_PID
